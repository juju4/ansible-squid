---

- name: Converge
  hosts: all
  environment:
    http_proxy: "{{ lookup('env', 'http_proxy') }}"
    https_proxy: "{{ lookup('env', 'https_proxy') }}"
    no_proxy: "{{ lookup('env', 'no_proxy') }}"
  remote_user: root
  vars:
    squid_jsonlog: true
    squid_testing: false
    e2guardian_banned: /etc/e2guardian/lists/bannedsitelist
  pre_tasks:
    - name: Ubuntu | Install python3
      ansible.builtin.raw: test -e /usr/bin/python3 || (apt -y update && apt install -y python3-minimal)
      register: python3
      changed_when: "'installed' in python3.stdout"
      when: (ansible_facts['distribution'] == "Ubuntu" and ansible_facts['distribution_major_version'] | int >= 16)
    - name: RedHat | Install python3
      ansible.builtin.raw: test -e /usr/bin/python3 || (yum install -y python3)
      register: python3
      changed_when: "'installed' in python3.stdout"
      when: (ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int >= 8)
    - name: Gather Facts
      ansible.builtin.setup:
      when: (ansible_facts['distribution'] == "Ubuntu" and ansible_facts['distribution_major_version'] | int >= 16)
    - name: Ubuntu Bionic+, Redhat 8+ | Enforce python3 for ansible
      ansible.builtin.set_fact:
        ansible_facts['python_interpreter:'] /usr/bin/python3
      when: >
        (ansible_facts['distribution'] == "Ubuntu" and ansible_facts['distribution_major_version'] | int >= 16) or
        (ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int >= 8)
    - name: RedHat8 | specific variables
      ansible.builtin.set_fact:
        squid_urlfiltering_enable: false
        squid_urlfiltering_tool: squidguard
        squid_report_pkgs: []
      when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] == '8'
    - name: RedHat7 | specific variables
      ansible.builtin.set_fact:
        squid_urlfiltering_enable: false
        squid_urlfiltering_tool: squidguard
        squid_report_pkgs:
          - calamaris
      when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] == '7'
    - name: Ubuntu20.04+ | specific variables
      ansible.builtin.set_fact:
        squid_urlfiltering_enable: true
        squid_urlfiltering_tool: e2guardian
      when: ansible_facts['distribution'] == "Ubuntu" and ansible_facts['distribution_major_version'] | int > 18
    - name: Ubuntu26.04+ | specific variables
      ansible.builtin.set_fact:
        e2guardian_banned: /etc/e2guardian/lists/common/bannedsitelist
      when: ansible_facts['distribution'] == "Ubuntu" and ansible_facts['distribution_major_version'] | int >= 26
  roles:
    - { role: juju4.redhat_epel, when: ansible_facts.os_family == "RedHat" }
    - juju4.squid
  tasks:
    - name: Banned few websites for testing
      ansible.builtin.lineinfile:
        dest: "{{ e2guardian_banned }}"
        line: "{{ item }}"
        mode: '0644'
        create: true
      with_items:
        - adblockanalytics.com
        - badboys.com
      notify:
        - E2guardian reload
      when: ansible_facts['distribution'] == "Ubuntu" and ansible_facts['distribution_major_version'] | int > 18
